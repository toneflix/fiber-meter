# FiberMeter — LIVE Fiber overlay.
#
#   docker compose -f docker-compose.yml -f docker-compose.live.yml up
#
# Runs the SAME db + API + dashboard + demo-service stack, but flips the API to
# the LIVE Fiber provider and starts a separate, bounded testnet auto-payer so
# auditors can trigger real settlement without installing a wallet or node.
#
# It expects separate payee (:8237) and payer (:8247) nodes on the host. Native
# nodes stay there so keys and channel state can be backed up; only the app tier
# and the stateless auto-payer loop are containerized.
#
# host.docker.internal lets the containers reach those host nodes; on Linux it is
# wired via the host-gateway extra_hosts entries below.
services:
  api:
    environment:
      FIBER_PROVIDER: live
      FIBER_RPC_URL: http://host.docker.internal:8237
      FIBER_PREFLIGHT_RPC_URL: http://host.docker.internal:8247
      FIBER_CURRENCY: Fibt
      CKB_EXPLORER_URL: https://testnet.explorer.nervos.org
      FIBER_DEMO_AUTOPAY: "true"
      FIBER_DEMO_MAX_PAYMENT_CKB: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  autopay:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts/autopay.mjs:/app/autopay.mjs:ro
    command: ["node", "autopay.mjs"]
    environment:
      API_URL: http://api:4000/api
      API_EMAIL: demo@fibermeter.dev
      API_PASSWORD: password123
      PAYER_RPC_URL: http://host.docker.internal:8247
      POLL_MS: "4000"
      MAX_PAYMENT_CKB: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    restart: unless-stopped
