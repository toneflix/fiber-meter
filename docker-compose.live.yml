# FiberMeter — LIVE Fiber overlay.
#
#   docker compose -f docker-compose.yml -f docker-compose.live.yml up
#
# Runs the SAME db + API + dashboard + demo-service stack, but flips the API to
# the LIVE Fiber provider and adds an auto-payer so a judge can click
# "Fund via Fiber" and watch a real testnet invoice settle end-to-end.
#
# It expects TWO fnn Fiber nodes running ON THE HOST (see docs/11-live-hosted-demo.md):
#   • payee node — the merchant, issues invoices — Fiber RPC on host :8237
#   • payer node — the customer, pays invoices     — Fiber RPC on host :8247
# The nodes stay on the host (not containerized) so their keys + channel state
# live in one place you control and back up. Only the app tier is dockerized.
#
# host.docker.internal lets the containers reach those host nodes; on Linux it is
# wired via the host-gateway extra_hosts entries below.
services:
  api:
    environment:
      FIBER_PROVIDER: live
      FIBER_RPC_URL: http://host.docker.internal:8237
      FIBER_CURRENCY: Fibt
      CKB_EXPLORER_URL: https://testnet.explorer.nervos.org
    extra_hosts:
      - "host.docker.internal:host-gateway"

  autopay:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts/autopay.mjs:/app/autopay.mjs:ro
    command: ["node", "autopay.mjs"]
    environment:
      API_URL: http://api:4000/api
      API_EMAIL: demo@fibermeter.dev
      API_PASSWORD: password123
      PAYER_RPC_URL: http://host.docker.internal:8247
      POLL_MS: "4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    restart: unless-stopped
